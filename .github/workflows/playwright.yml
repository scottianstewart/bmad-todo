name: Playwright

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC nightly

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Cross-browser e2e (chromium / firefox / webkit)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U todo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        env:
          PGPASSWORD: todo
        run: |
          # drizzle-kit migrate has a known silent-failure issue (see
          # _bmad-output/implementation-artifacts/deferred-work.md), so we
          # apply the SQL directly via psql.
          for f in apps/server/src/db/migrations/*.sql; do
            psql -h localhost -p 5433 -U todo -d todo -f "$f"
          done

      - name: Install Playwright browsers
        run: pnpm --filter client exec playwright install --with-deps

      - name: Run Playwright tests
        env:
          CI: 'true'
        run: pnpm --filter client exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/client/playwright-report/
          retention-days: 14
