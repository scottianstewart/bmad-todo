name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test -- --coverage

      - name: Check server coverage
        run: |
          pnpm --filter server exec vitest run --coverage --coverage.reporter=json
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const report = JSON.parse(readFileSync('./apps/server/coverage/coverage-summary.json', 'utf8'));
            const lines = report.total.lines.pct;
            console.log('Server line coverage: ' + lines + '%');
            if (lines < 80) { console.error('Coverage below 80% threshold'); process.exit(1); }
          "

      - name: Check client coverage
        run: |
          pnpm --filter client exec vitest run --coverage --coverage.reporter=json
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const report = JSON.parse(readFileSync('./apps/client/coverage/coverage-summary.json', 'utf8'));
            const lines = report.total.lines.pct;
            console.log('Client line coverage: ' + lines + '%');
            if (lines < 80) { console.error('Coverage below 80% threshold'); process.exit(1); }
          "
