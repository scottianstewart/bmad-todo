server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Static assets: long cache, immutable (Vite hashes filenames).
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy /api to the server container (resolved on the Docker network).
  location /api/ {
    proxy_pass http://server:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA fallback: every non-asset, non-/api path serves index.html so
  # the client-side router (when added) can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
